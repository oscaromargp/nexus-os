<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="none"/>
  <!-- Screen/monitor -->
  <rect x="120" y="60" width="260" height="180" rx="16" fill="rgba(0,240,255,0.08)" stroke="rgba(0,240,255,0.3)" stroke-width="2"/>
  <rect x="140" y="80" width="220" height="140" rx="8" fill="rgba(0,240,255,0.05)"/>
  <!-- Lines representing empty content -->
  <rect x="155" y="100" width="140" height="8" rx="4" fill="rgba(0,240,255,0.15)"/>
  <rect x="155" y="118" width="100" height="6" rx="3" fill="rgba(0,240,255,0.1)"/>
  <rect x="155" y="134" width="120" height="6" rx="3" fill="rgba(0,240,255,0.1)"/>
  <!-- Question mark -->
  <circle cx="290" cy="150" r="30" fill="rgba(0,240,255,0.1)" stroke="rgba(0,240,255,0.3)" stroke-width="1.5"/>
  <text x="290" y="158" text-anchor="middle" fill="rgba(0,240,255,0.6)" font-size="22" font-family="sans-serif" font-weight="700">?</text>
  <!-- Stand -->
  <rect x="225" y="240" width="50" height="20" rx="4" fill="rgba(0,240,255,0.12)" stroke="rgba(0,240,255,0.2)" stroke-width="1.5"/>
  <rect x="190" y="258" width="120" height="10" rx="5" fill="rgba(0,240,255,0.12)" stroke="rgba(0,240,255,0.2)" stroke-width="1.5"/>
  <!-- Stars/sparkles -->
  <circle cx="95" cy="140" r="4" fill="rgba(0,240,255,0.3)"/>
  <circle cx="415" cy="100" r="3" fill="rgba(0,240,255,0.2)"/>
  <circle cx="420" cy="220" r="5" fill="rgba(0,240,255,0.25)"/>
  <circle cx="80" cy="220" r="3" fill="rgba(0,240,255,0.2)"/>
</svg>
