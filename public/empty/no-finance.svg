<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="none"/>
  <!-- Wallet -->
  <rect x="110" y="100" width="280" height="180" rx="16" fill="rgba(0,240,255,0.07)" stroke="rgba(0,240,255,0.28)" stroke-width="2"/>
  <rect x="110" y="100" width="280" height="50" rx="16" fill="rgba(0,240,255,0.12)" stroke="rgba(0,240,255,0.2)" stroke-width="1"/>
  <rect x="330" y="150" width="60" height="80" rx="10" fill="rgba(0,240,255,0.1)" stroke="rgba(0,240,255,0.3)" stroke-width="1.5"/>
  <circle cx="358" cy="190" r="10" fill="rgba(0,240,255,0.2)" stroke="rgba(0,240,255,0.4)" stroke-width="1.5"/>
  <!-- Dollar sign -->
  <text x="255" y="220" text-anchor="middle" fill="rgba(0,240,255,0.15)" font-size="60" font-family="sans-serif" font-weight="900">$</text>
  <!-- Small coins -->
  <ellipse cx="160" cy="320" rx="22" ry="10" fill="rgba(0,240,255,0.15)" stroke="rgba(0,240,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="160" cy="313" rx="22" ry="10" fill="rgba(0,240,255,0.1)" stroke="rgba(0,240,255,0.25)" stroke-width="1.5"/>
  <ellipse cx="200" cy="325" rx="18" ry="8" fill="rgba(0,240,255,0.12)" stroke="rgba(0,240,255,0.25)" stroke-width="1.5"/>
</svg>
