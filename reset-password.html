<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer Contraseña — Nexus OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #000000; --bg-secondary: #09090B; --bg-tertiary: #18181B;
      --p400: #00f0ff; --p300: #1af3ff; --primary-rgb: 0,240,255;
      --text-primary: #FFFFFF; --text-secondary: #E4E4E7;
      --text-tertiary: #A1A1AA; --text-quaternary: #71717A;
      --success: #22C55E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .glass-box {
      background: var(--bg-secondary);
      border: 1px solid rgba(var(--primary-rgb), 0.2);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 80px rgba(var(--primary-rgb), 0.1);
      text-align: center;
    }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 20px; color: var(--text-primary);
      margin-bottom: 32px; text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #00a8b8, #00f0ff);
      border-radius: 9px; display: grid; place-items: center;
      font-size: 18px; box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.4);
    }
    h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
    p { font-size: 14px; color: var(--text-tertiary); margin-bottom: 32px; line-height: 1.6; }
    
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-quaternary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .form-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(var(--primary-rgb), 0.15); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 15px; padding: 12px 16px; border-radius: 10px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--p400); box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1); }
    
    .btn-primary {
      width: 100%; padding: 14px; border-radius: 12px;
      background: linear-gradient(135deg, var(--p400), var(--p300));
      color: #000; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 15px; border: none; cursor: pointer;
      transition: all 0.3s ease; box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 0 30px rgba(var(--primary-rgb), 0.5); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #message { margin-top: 24px; font-size: 13px; padding: 12px; border-radius: 8px; display: none; }
    #message.success { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    #message.error { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  </style>
</head>
<body>

  <div class="glass-box">
    <a href="/" class="logo">
      <div class="logo-icon">⬡</div>
      Nexus OS
    </a>

    <h1>Nueva Contraseña</h1>
    <p>Ingresa tu nueva clave de acceso para recuperar el control de tu Nexus.</p>

    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">Nueva Contraseña</label>
        <input type="password" id="new-password" class="form-input" placeholder="mínimo 8 caracteres" required minlength="8" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar Contraseña</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="repite tu contraseña" required minlength="8" />
      </div>
      <button type="submit" id="submit-btn" class="btn-primary">Cambiar Contraseña →</button>
    </form>

    <div id="message"></div>
    
    <div id="success-actions" style="display:none; margin-top: 24px;">
      <a href="/" class="btn-primary" style="display:inline-block; text-decoration:none;">Ir al Inicio de Sesión</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from '@supabase/supabase-js'

    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL
    const SUPABASE_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    const form = document.getElementById('reset-form')
    const messageEl = document.getElementById('message')
    const submitBtn = document.getElementById('submit-btn')
    const successActions = document.getElementById('success-actions')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const newPassword = document.getElementById('new-password').value
      const confirmPassword = document.getElementById('confirm-password').value

      if (newPassword !== confirmPassword) {
        showMessage('Las contraseñas no coinciden', true)
        return
      }

      submitBtn.disabled = true
      showMessage('Actualizando contraseña...')

      const { error } = await supabase.auth.updateUser({ password: newPassword })

      if (error) {
        showMessage(error.message, true)
        submitBtn.disabled = false
      } else {
        showMessage('¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.')
        form.style.display = 'none'
        successActions.style.display = 'block'
      }
    })

    function showMessage(text, isError = false) {
      messageEl.textContent = text
      messageEl.className = isError ? 'error' : 'success'
      messageEl.style.display = 'block'
    }
  </script>
</body>
</html>
